<ion-header class="nab-header">
  <ion-toolbar class="damco-subheader">
    <ion-buttons slot="start" *ngIf='showback'>
      <ion-back-button defaultHref="/" color="black"></ion-back-button>

    </ion-buttons>
    <ion-title class="subhead-title">
      {{title}}
    </ion-title>
    <ion-buttons slot="end" *ngIf='showMenu'>
      <ion-menu-button></ion-menu-button>
    </ion-buttons>

  </ion-toolbar>
</ion-header>
