
    <ion-slides #slides class="plan-slider" [options]="slideOpts">
      <ion-slide *ngFor="let plan of planList; let i = index;">
        <plan-card 
            [plan]="plan" 
            [color]="colors[i]"
            [features]="plans.features" 
            [bodyType]="bodyType"
            (buyNow)="onBuy($event)"
            (showDetails)="onShowDetails($event)"
            ></plan-card>
      </ion-slide>
    </ion-slides>
