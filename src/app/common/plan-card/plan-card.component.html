<div class="card animate__animated animate__bounceInDown">
  <img class="card-img-top" src="assets/banner1.JPG" alt="Card image cap">
  <div class="card-body">
    <h5 class="card-title"> {{plan.name}} </h5>
    <p class="card-text">
      <span class="price"> <span class="rs" >&#8377;</span> {{ plan.pricing[bodyType] }}</span>
      <br />
      <span></span>
    </p>
  </div>
  <div class="card-body feature-list">

      <div class="row" *ngFor="let ftr of currentFeatures">
        <div class="col-10">
            {{ftr.name}} <br/> <span class="frequency"> {{ftr.frequency}}</span>
        </div>
        <div class="col-2">
            <feature-avail available="true"></feature-avail>  
         
        </div>

      </div>

      <div class="row" *ngFor="let ftr of missingFeatures">
          <div class="col-10 gray">
              {{ftr.name}} <br/>
          </div>
          <div class="col-2">
              <feature-avail [available]="false"></feature-avail>  
           
          </div>
  
        </div>
  </div>

  <div class="card-body">
    <div class="row">
      <div class="col-12">
        <cta text="See Plan Details" [outline]="true"></cta>
    </div>
  </div>

  <div class="row">
      <div class="col-12">
        <cta text="Buy Now"></cta>
    </div>
  </div>
</div>
