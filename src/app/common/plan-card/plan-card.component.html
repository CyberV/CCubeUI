<mat-card class="card animate__animated animate__fadeInRight">
  <div class="card-body card-top"  (click)="onShowDetails()" [style.borderColor]="color">
    <h5 class="card-title" > {{plan.name}} </h5>
    <h6 class="monthly-label">{{plan.duration == 'quarterly' ? 'QUARTERLY' : 'MONTHLY'}} PLAN</h6>

  </div>
  <p class="card-text"  (click)="onShowDetails()">
      <span class="old-price" *ngIf="!forUpgrade && plan.originalPrice" Rs> {{plan.originalPrice}}</span> <span *ngIf="!forUpgrade" class="price" Rs>{{ plan.price }}</span>
      <span *ngIf="forUpgrade">
        <span> Extra </span>
       <span class="price" Rs > {{ plan.price }} <span class="permonth"> /month </span></span> 
      </span>
      <br />
      <span></span>
    </p>
  <div class="card-body feature-list" >
   
    <list limit="6"  *ngIf="currentFeatures.length > 0">
      <div class="row feature-row" *ngFor="let ftr of currentFeatures" (click)="onShowDetails(ftr)">
        <div class="col-1 text">
          <ion-icon slot="start" [style.color]="colors[ftr.weight - 1]" class="ion-color-yellow" name="star"></ion-icon>
        </div>
        <div class="col-10">
          {{ftr.name}}
        </div>


      </div>
    </list>

    <ng-container *ngIf="currentFeatures.length == 0">
        <div class="row feature-row" >
            <div class="col-1 text">
              <ion-icon slot="start" [style.color]="colors[0]" class="ion-color-yellow" name="star"></ion-icon>
            </div>
            <div class="col-10">
              Outside Cleaning - Twice a Week
            </div>
    
    
          </div>
          <div class="row feature-row" >
              <div class="col-1 text">
                <ion-icon slot="start" [style.color]="colors[0]" class="ion-color-yellow" name="star"></ion-icon>
              </div>
              <div class="col-10">
                Inside Cleaning - Twice a Week
              </div>
      
      
            </div>
    </ng-container>

  </div>

  <div class="card-body actions-row">
    <!-- <div class="row">
      <div class="col-12">
        <cta text="Plan Details" (action)="onShowDetails()" [outline]="true"></cta>
      </div>
    </div> -->

    <div class="row">
      <div class="col-12">
        <cta [text]="forUpgrade ? 'Upgrade Now' : 'Buy Now'" (action)="onBuy()"></cta>
      </div>
    </div>
  </div>
</mat-card>
