<div class="row" id="top">
  <div class="col-12">
    <div class="row">


      <div class="col-6 --no-padding">
        <img *ngIf="car" class="page-logo vertical-center --no-padding" [src]="car.image"
          (click)="showLink = !showLink">
      </div>

      <div class="col-6">
        <div *ngIf="car" class="car-info" role="alert">
          <span class="model">{{car.model}}</span>
          <span class="regNo">{{car.regNo}}</span>
          <span>
            <span class="plan-name">{{plan.name}}</span> Plan
          </span>
          <span>Expires On {{expiryDate}}</span>

          <div class="plan-comparison-link">

          </div>
          <!-- <span class="alert-link float-right" (click)="resetCar()">Change Car</span> -->
        </div>
      </div>
    </div>
  </div>
</div>

<div class="">
  <div class="row">
    <div class="col-12 tabs-container">
        <mat-accordion >
            <mat-expansion-panel  class = "drop">
              <mat-expansion-panel-header class = "drop">
                <mat-panel-title>
                    <ion-icon [style.color]="'#ffa169'" name="calendar-outline"></ion-icon> <span class="header-text">Schedule</span> 
                </mat-panel-title>
                <mat-panel-description class = "drop">
                    
                </mat-panel-description>
              </mat-expansion-panel-header>
              <weekly-schedule></weekly-schedule>
             
              
            </mat-expansion-panel>
            <mat-expansion-panel  class = "drop">
            <mat-expansion-panel-header class = "drop">
                <mat-panel-title>
                    <ion-icon name="document-text-outline"></ion-icon><span class="header-text"> Documents</span>
                </mat-panel-title>
                <mat-panel-description class = "drop">
                    
                </mat-panel-description>
              </mat-expansion-panel-header>
              <document-uploader></document-uploader>
             
              
            </mat-expansion-panel>
            <mat-expansion-panel  class = "drop">
            <mat-expansion-panel-header class = "drop">
                <mat-panel-title>
                    <ion-icon [style.color]="'#26de77'" name="save-outline"></ion-icon><span class="header-text"> History</span>
                </mat-panel-title>
                <mat-panel-description class = "drop">
                    
                </mat-panel-description>
              </mat-expansion-panel-header>
              <p class="frequency">Service History Here</p>
      
              
             
              
            </mat-expansion-panel>
          </mat-accordion>
    </div>
