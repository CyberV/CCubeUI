<div id="carouselExampleIndicators" class="carousel slide" data-ride="carousel">
  <div class="carousel-inner">

    <ion-slides>
      <ion-slide *ngFor="let ad of ads; let i = index" (click)="selectAd(ad)">
          <div >
              <img [src]="'assets/backgrounds/' + ad.image + '.png'" class="d-block w-100" alt="...">
              <div class="info-container">
                <span class="title">{{ad.title}}</span>
                <p class="desc">{{ad.description}}</p>
              </div>
              <div class="discount-container" [class.contrast]="i%2==1" *ngIf="ad.discount!='null'">
                <span class="discount-label">Save {{ad.discount}}</span>
              </div>
            </div>
      </ion-slide>
    </ion-slides>

  </div>
  <!-- <a class="carousel-control-prev" href="#carouselExampleIndicators" role="button" data-slide="prev">
    <ion-icon name="chevron-back-outline"></ion-icon>
    <span class="sr-only">Previous</span>
  </a>
  <a class="carousel-control-next" href="#carouselExampleIndicators" role="button" data-slide="next">
    <ion-icon name="chevron-forward-outline"></ion-icon>
    <span class="sr-only">Next</span>
  </a> -->
</div>
