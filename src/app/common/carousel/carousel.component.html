  <ion-slides #carousel [options]="options" pager>
    <ion-slide>
      <img src="./assets/slides/1.PNG" class="d-block w-100" alt="...">
    </ion-slide>
    <ion-slide>
      <img src="./assets/slides/2.PNG" class="d-block w-100" alt="...">
    </ion-slide>
    <ion-slide class="water-slide">
        
      <img src="./assets/slides/3.PNG" class="d-block" alt="...">
      <counter></counter>
    </ion-slide>
  </ion-slides>
  <a class="carousel-control-prev" *ngIf="currentIndex!=0" (click)="previousSlide()"  role="button" data-slide="prev">
      <ion-icon name="chevron-back-outline"></ion-icon>
      <span class="sr-only">Previous</span>
  </a>
    <a class="carousel-control-next" *ngIf="currentIndex!=2" (click)="nextSlide()" role="button" data-slide="next">
      <ion-icon name="chevron-forward-outline"></ion-icon>
      <span class="sr-only">Next</span>
    </a>

  <div class="row actions-row" *ngIf="currentIndex != 2">
    <div class="col-3">
  <cta small="true" outline="true" text="Skip" (action)="sendSkip()"></cta>

    </div>
    <div class="col-6"></div>
    <div class="col-3">
  <cta small="true" outline="true" text="Next" (action)="nextSlide()"></cta>

    </div>
  </div>
