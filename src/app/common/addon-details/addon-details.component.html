<div class="addon-container">
  <div class="addon-info">
      <span *ngIf="showClose" class="float-right" (click)="closeModal()">X</span>
    <h2 #pageTop class="--padding-x"><span class="addon-name">{{addon.name}}</span> {{isAdhoc ? 'Service' : 'Add On'}} </h2>
    
    <p>
      <span class="price" Rs> {{addon.price}}</span> <span *ngIf="!isAdhoc"> for 1 month.</span>
    </p>
    <p *ngIf="startDate && !bookedTime">
        <span  class="startLabel">
          Starts from <span>{{startDate}}</span>
        </span>
      </p>

      <p *ngIf="bookedTime">
        <span  class="startLabel">
          Scheduled On <span>{{bookedDate}}</span>
        </span>
      </p>

      <span *ngIf="bookedTime"></span>
  </div>
  <ion-list>
    <ion-list-header>
      <span class="description">{{addon.description}}</span>
    </ion-list-header>

    <ion-item-group>
      <ion-item-divider>
        <ion-label class="divider">Details</ion-label>
      </ion-item-divider>

      <ion-item lines="none">
        <ion-label>
          <ion-icon class="water" name="water-outline"></ion-icon> Water Efficient
        </ion-label>
      </ion-item>

      <ion-item lines="none">
        <ion-label>
          <ion-icon class="time" name="timer-outline"></ion-icon> Long Lasting
        </ion-label>
      </ion-item>

      <ng-container *ngIf="!(addon.code == 'FBW' || addon.code == 'WASH_DEEP')">
        <ion-item-divider>
          <ion-label class="divider">Frequency</ion-label>
        </ion-item-divider>

        <ion-item lines="none">
          <ion-label>
            <ion-icon class="frequency" name="cellular-outline"></ion-icon> Twice A Week
          </ion-label>
        </ion-item>
      </ng-container>

      <ng-container *ngIf="(addon.code == 'FBW' || addon.code == 'WASH_DEEP') && !bookedTime">
          <ion-item-divider>
            <ion-label class="divider">Schedule</ion-label>
          </ion-item-divider>
  
          <ion-item lines="none">


            <datepicker [readOnly]="laterSelected" [minDate]="minDate" [maxDate]="maxDate" [(value)]="selectedDate" placeholder="Period: Next 30 days" (valueChange)="selectDate($event)"></datepicker>
           

            <!-- <ion-label (click)="showDatePicker()">
              <ion-icon class="calendar" name="cellular-outline"></ion-icon> Select a Date
            </ion-label> -->
          </ion-item>
          <ion-item lines="none" class="--margin-top">
              
              <mat-checkbox [checked]="laterSelected" (change)="laterSelected = !laterSelected">
                  I will schedule Later
  
                </mat-checkbox>
          </ion-item>

         
          
        </ng-container>
    </ion-item-group>
  </ion-list>
  <cta sticky="true" *ngIf="!laterSelected" [loading]="loading" text="Book Now" (action)="scheduleAddon(addon)" ></cta>
</div>
