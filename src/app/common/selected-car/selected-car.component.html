<div class="row" id="top">
    <div class="col-7 --no-padding">
      <!-- <img class="page-logo" src="assets/whitell.png" /> -->
      <img class="page-logo --no-padding" [src]="car.image" (click)="showLink = !showLink"><br/>
      <span *ngIf="showLink" (click)="onChangeCar()" [ngClass]="{'change-car-link float-left animate__animated':true, 'animate__fadeInDown' : showLink}" >Change Car</span>
    </div>
    <div class="col-5">

      <div class="row">
        <div *ngIf="car" class="car-info" role="alert">
          <span class="maker">{{car.maker}}</span> <br/> <span class="model">{{car.model}}</span>
          <div class="plan-comparison-link" >
              
          </div>
          <!-- <span class="alert-link float-right" (click)="resetCar()">Change Car</span> -->
        </div>
      </div>

    </div>
  </div>
