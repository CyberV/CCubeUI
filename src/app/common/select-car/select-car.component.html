<div class="row">
  <div class="col-12">
    <mobile-input [labelOnly]="true" name="Select Your Car"></mobile-input>
    <cc-accordion #makerDrawer [title]="makerLabel" (onToggle)="onMakerToggle($event)">
      <mobile-input class="maker-search" [inputOnly]="true" type="text" placeholder="Search..." [(value)]="maker"
        (valueChange)="makerSelected = false; model=''; modelSelected = false; "></mobile-input>
      <div class="panel-makers row">
        <!-- <ion-slides [options]="options"> -->
        <div *ngFor="let mkr of filteredMakers" class="col-4 col-md-4 maker-row" (click)="selectMaker(mkr)">
          <div>
            <mat-card class="card maker animate__animated animate__fadeInDown --no-padding-top">
              <div class="row maker-row-content">
                <div class="col-12 col-md-12 image-row">
                  <img class="card-img-top" [src]="mkr.logo" [alt]="mkr.name">
                </div>
                <div class="col-12 col-md-12 --no-padding maker-name">
                  <div class="card-body --no-padding">
                    <h5 class="card-title"> {{mkr.name | uppercase}} </h5>
                  </div>
                </div>
              </div>


            </mat-card>

          </div>
        </div>


      </div>
    </cc-accordion>

    <cc-accordion #modelDrawer *ngIf="makerSelected" [title]="modelLabel"  (onToggle)="onModelToggle($event)">
      <mobile-input class="model-search" [inputOnly]="true" type="text" placeholder="Search..." [(value)]="model"
        (valueChange)="modelSelected = false"></mobile-input>

        <div class="panel-models row">
          <mat-card *ngFor="let mdl of filteredModels" (click)="selectModel(mdl)"
            class="card col-12 col-md-4 model animate__animated animate__fadeInLeft --no-padding-top">
            <div class="row model-row-content">
              <div class="col-5 col-md-12 image-row text-center">
                <img class="card-img-top" [src]="mdl.image" [alt]="mdl.name">
              </div>
              <div class="col-7 col-md-12 text-center">
                <div class="card-body --no-padding">
                  <h5 class="card-title --no-padding top-1"> {{mdl.model | uppercase}} </h5>
                </div>
              </div>
            </div>
          </mat-card>
        </div>
    </cc-accordion>
    <cc-accordion class="--no-click" *ngIf="modelSelected" empty="true" [title]="'Body Type : '+ displayType">
      <p>Check Plans for {{displayType}} on next Page.</p>
    </cc-accordion>
  </div>

  <div *ngIf="modelSelected">
    <cta text="Show Plans" [sticky]="true" (action)="submit()"></cta>

  </div>
</div>
