<div [class.--padding-x]="!slim">


<cc-accordion [title]="appliedCoupons.length == 0 ? 'Looking For Coupons ?' : 'Coupon Applied'">
  <heading *ngIf="availableCoupons.length == 0" text="No Coupons Available Today!"></heading>
  <ion-list class="list-notif">
    <ion-item-group>

        <div class="row discount-item one-edge-shadow applied" [class.personal]="item.validFor=='user'" [class.society]="item.validFor=='society'"  *ngFor="let item of appliedCoupons">
            <div class="col-8 --no-padding ">
              <span class="name">{{item.name}}</span>
              <br/>
              Valid For: <span class="desc">
                <span *ngIf="item.validFor=='user'"> Only You</span>
                <span *ngIf="item.validFor=='society'"> {{item.society}} </span>
                <span *ngIf="item.validFor=='all'">All</span>
              </span> <br/>
              <span class="applied">APPLIED </span>
             
            </div>
            <div class="col-4 --no-padding bold discount-container">
              <ion-label>
                <img src="assets/icons/discount.png" />
                <div class="discount-label">
                  <span *ngIf="item.unit!='percent'" Rs [rscolor]="'white'">{{item.value}} OFF !</span>
                  <span *ngIf="item.unit=='percent'">{{item.value}} % OFF</span>
                </div>
              </ion-label>
            </div>
          </div>

      <div class="row discount-item one-edge-shadow" [class.personal]="item.validFor=='user'" [class.society]="item.validFor=='society'"  *ngFor="let item of filteredCoupons" (click)="applyCoupon(item)">
        <div class="col-8 --no-padding ">
          <spinner *ngIf="loading[item.code]" class="spinner" [color]="'blue'"></spinner>
          <span class="name">{{item.name}}</span>
          <br/>
          Valid For: <span class="desc">
            <span *ngIf="item.validFor=='user'"> Only You</span>
            <span *ngIf="item.validFor=='society'"> {{item.society}} </span>
            <span *ngIf="item.validFor=='all'">All</span>
          </span>
         
        </div>
        <div class="col-4 --no-padding bold discount-container">
          <ion-label>
            <img src="assets/icons/discount.png" />
            <div class="discount-label">
              <span *ngIf="item.unit!='percent'" Rs [rscolor]="'white'">{{item.value}} OFF !</span>
              <span *ngIf="item.unit=='percent'">{{item.value}} % OFF</span>
            </div>
          </ion-label>
        </div>
      </div>
    </ion-item-group>
  </ion-list>
</cc-accordion>

</div>
