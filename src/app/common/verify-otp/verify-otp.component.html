
<div>
  <span>Please enter your <span highlight>{{length}} digit Verification Code </span> sent to your Mobile Number</span>
</div>

<div class="row">
  <div class="col-8 --no-padding-right">
      <div class="otp-input">
          <input *ngFor="let i of arr; let indx = index" 
            [class]="'otp-'+indx" 
            type="number" maxlength="1"
            (click)="onClick($event)"
            (keyup)="onChange($event)"
            oninput="javascript: if (this.value.length > this.maxLength) this.value = this.value.slice(0, this.maxLength);"
            maxlength="1"
            >
        
            
        </div>
  </div>
  <div class="col-4 --no-padding">
     <span class="resend" (click)="resendOtp()">Resend OTP</span> 
  </div>
</div>


<p *ngIf="mismatch" class="mismatch"> OTP does not match. Try Again!</p>
