<div class="car-form">
    <img *ngIf="currentCar && !verifyOnly" [src]="currentCar.image" class="center animate__animated animate__tada" style="margin-bottom: -1em"/>
        <mobile-input type="text" uppercase="true" name="Enter Your Car Number" [error]="regError" (enterKey)="focusTo('ctaCar')" placeholder="" [(value)]="regNo" (valueChange)="findingCar = false; showFileUploader = false;" ></mobile-input>
        <warning *ngIf="showFileUploader && !verifyOnly" text="We are facing some technical difficulties. You can try again or select car below."></warning>
        <cta #ctaCar pill="true" *ngIf="!findingCar && isTypingRegNo" text="Get Car Details" (action)="findingCar = true" [loading]="loading"></cta>

        <car-display *ngIf="findingCar && isTypingRegNo" [carNo]="regNo" [verifyOnly]="verifyOnly" (letsgo)="goToPlans($event)" (error)="onError($event)" (carReady)="saveCar($event)"></car-display>
        <!-- <document-uploader *ngIf="showFileUploader && verifyOnly" (file)="goToPlans($event)" text="Upload your Car's RC Document."></document-uploader> -->

        <warning *ngIf="showFileUploader && verifyOnly" text="We are facing some technical difficulties. Kindly proceed to Checkout."></warning>
        <div *ngIf="!isTypingRegNo" class="animate__animated" [class.animate__fadeOutUp]="isTypingRegNo">
          
            <ng-container *ngIf="!verifyOnly">
                <heading text="OR" align="center" size="16" color="gray"></heading>
    
                <select-car (letsgo)="goToPlans($event)" (carSelected)="saveCar($event)"></select-car>
            </ng-container>
           
        
        </div>

        
        
      
    
    
</div>
