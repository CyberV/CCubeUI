<div class="row">
  <div class="offset-3 col-6">
    <span class="logo-container"><img class="logo " src="./assets/whitell.png" alt="CCubeLogo" border="0" />
    </span>
  </div>
</div>

<ads-list *ngIf="!loading &&  payments.length == 0"></ads-list>

<ng-container *ngIf="!loading">
  <div class="row">
    <div class="col-12 car-slider-container --padding-x">


      <ion-slides [options]="carSliderOptions">

        <ion-slide *ngFor="let payment of payments; let i = index">
          <div class="car-box" [class.active]="selectedIndex == i" (click)="selectCar(i)">

            <ion-label class="car-image"><img [src]="payment.payments[0].car.image" /></ion-label>
            <ion-badge *ngIf="getNotificationCount(payment.payments[0].car.regNo) > 0">
              <ion-icon name="notifications-outline"></ion-icon> {{getNotificationCount(payment.payments[0].car.regNo)}}
            </ion-badge>
          </div>
          <!-- <mat-card class="card addon-card animate__animated animate__flipInX">
            
                      </mat-card> -->
        </ion-slide>


        <ion-slide (click)="addCar()" class="add-car-slide" [class.full-width]="payments.length == 0">
          <p>
            <ion-icon name="add-circle-outline"></ion-icon><br />
          </p>
          <ion-label>Add Car</ion-label>

        </ion-slide>

      </ion-slides>




    </div>
  </div>

  <div class="row car-info-container">
    <div class="col-12">
      <ng-container *ngIf="!loading &&  payments.length == 0">
        
        <heading text="Looks like you haven't registered a car yet." align="center"></heading>
        <div class="--padding-x">
          <cta text="Add Car" (action)="addCar()"></cta>
        </div>
        <br />
        
        <book-demo></book-demo>
      </ng-container>
      <ng-container *ngIf="payments.length">
        <ion-slides #planSlider [options]="planSliderOptions">

          <ion-slide *ngFor="let payment of payments; let i = index">
            <purchased-plan [style.width.%]="100" [subscription]="payment" (renewPlan)="handleRenewPlan($event)"

            (scheduleService)="handleScheduleService($event)"
              [payment]="payment.payments[0]" [car]="payment.payments[0].car" [plan]="payment.payments[0].plan">
            </purchased-plan>
          </ion-slide>

        </ion-slides>

        <ads-list></ads-list>

        <div class="row --padding-x info-row" *ngIf="selectedSubscription.isRcMissing">
          <div class="col-12 tabs-container">
            <mat-accordion>
              <mat-expansion-panel class="drop">
                <mat-expansion-panel-header class="drop">
                  <mat-panel-title>
                      <ion-icon name="information-circle-outline"></ion-icon>
                     <span
                      class="header-text">Information Required!</span>
                  </mat-panel-title>
                  <mat-panel-description class="drop">

                  </mat-panel-description>
                </mat-expansion-panel-header>

                  <heading>Your car details are not verified. </heading>
                  <heading>Please share your car's Registration Certificate immediately.</heading>

                  <cta small="true" text="Upload Now" (action)="shareRc()"></cta>
              </mat-expansion-panel>

            </mat-accordion>
          </div>
        </div>

        <br/>

        <div class="row --padding-x">
          <div class="col-12 tabs-container">
            <mat-accordion>
              <mat-expansion-panel class="drop">
                <mat-expansion-panel-header class="drop">
                  <mat-panel-title>
                    <ion-icon [style.color]="'#ffa169'" name="calendar-outline"></ion-icon> <span
                      class="header-text">Schedule</span>
                  </mat-panel-title>
                  <mat-panel-description class="drop">

                  </mat-panel-description>
                </mat-expansion-panel-header>
                <weekly-schedule *ngIf="selectedSubscription.schedule.length"
                  [hasAvailedFreeReschedule]="selectedSubscription.hasAvailedFreeReschedule"
                  [lastDate]="selectedPayment.expiresOn" [schedule]="selectedSubscription.schedule"></weekly-schedule>
                <heading *ngIf="!selectedSubscription.schedule.length"
                  text="Schedule is Under Processing. Please wait for Plan Activation."></heading>

              </mat-expansion-panel>
              <mat-expansion-panel class="drop">
                <mat-expansion-panel-header class="drop">
                  <mat-panel-title>
                    <ion-icon name="document-text-outline"></ion-icon><span class="header-text"> Documents</span>
                  </mat-panel-title>
                  <mat-panel-description class="drop">

                  </mat-panel-description>
                </mat-expansion-panel-header>
                <document-list [carRegNo]="selectedCar.regNo"></document-list>


              </mat-expansion-panel>
              <mat-expansion-panel class="drop">
                <mat-expansion-panel-header class="drop">
                  <mat-panel-title>
                    <ion-icon [style.color]="'#26de77'" name="save-outline"></ion-icon><span class="header-text">
                      History</span>
                  </mat-panel-title>
                  <mat-panel-description class="drop">

                  </mat-panel-description>
                </mat-expansion-panel-header>
                <service-history [carRegNo]="selectedCar.regNo"></service-history>
              </mat-expansion-panel>
            </mat-accordion>
          </div>
        </div>
      </ng-container>


    </div>
    <div class="col-6">
      <!-- <drag-list> </drag-list> -->
      <!-- <document-uploader class="vertical-center doc-upload">

      </document-uploader> -->
    </div>
  </div>

</ng-container>

<ng-container *ngIf="loading">
  <spinner></spinner>
</ng-container>


<refer-earn [slim]="true"></refer-earn>

<ng-container *ngIf="!loading && payments.length > 0 && !selectedSubscription.isAdhoc ">
  <upgrade-slider *ngIf="upgradePlans.length" [plans]="upgradePlans" class="--padding-y"
    (upgradeNow)="handleUpgradePlan($event)" (showDetails)="showPlanDetails($event)"></upgrade-slider>

    <addon-slider [bodyType]="selectedCar.bodyType" [selectedAddons]="subAddons" [plan]="selectedSubscription.payments[0].plan"
    [subscriptionAddons]="selectedSubscription.addons" [active]="true" (showDetails)="openAddon($event)"
    (addonSelected)="onAddonSelected($event)"></addon-slider>

  <!-- <adhoc-slider [selectedAdhocs]="subAdhocs" active="true" (adhocSelected)="onAdhocSelected($event)"></adhoc-slider> -->

  
  <adhoc-slider  [plan]="selectedSubscription.payments[0].plan"
  [bodyType]="selectedCar.bodyType" [subscriptionAdhocs]="selectedSubscription.adhocs" [active]="true" [selectedAdhocs]="subAdhocs" 
  (reschedule)="handleAdhocReschedule($event)" (adhocSelected)="onAdhocSelected($event)" (showDetails)="openAddon($event)" ></adhoc-slider>

  <!-- <plan-slider *ngIf="upgradePlans.length" [plans]="upgradePlans"></plan-slider> -->
</ng-container>


<ng-container *ngIf="!loading && payments.length > 0 && selectedSubscription && selectedSubscription.isAdhoc">
  <switch (toggle)="refreshPlans()"></switch>
    <plan-slider #planSelector [plans]="currentPlans" [bodyType]="selectedCar.bodyType" (showDetails)="onShowDetails($event)"
    (buyNow)="buyPlan($event)"></plan-slider>
      <addon-slider [bodyType]="selectedCar.bodyType" [selectedAddons]="subAddons"
      [subscriptionAddons]="selectedSubscription.addons" [active]="true" (showDetails)="openAddon($event)"
      (addonSelected)="promptForPlan()"></addon-slider>
  
    <!-- <adhoc-slider [selectedAdhocs]="subAdhocs" active="true" (adhocSelected)="onAdhocSelected($event)"></adhoc-slider> -->
    <adhoc-slider [bodyType]="selectedCar.bodyType" [subscriptionAdhocs]="selectedSubscription.adhocs" [active]="true" [selectedAdhocs]="subAdhocs" (adhocSelected)="onAdhocSelected($event)" (showDetails)="openAddon($event)" (reschedule)="handleAdhocReschedule($event)"></adhoc-slider>
  
    <!-- <plan-slider *ngIf="upgradePlans.length" [plans]="upgradePlans"></plan-slider> -->
  </ng-container>
