<div class="container">
    <div  *ngIf="isCarSelected && currentCar" class="alert alert-primary" role="alert">
        <strong>{{currentCar.maker}}</strong>  |  <strong>{{currentCar.model}}</strong> | <strong>{{currentCar.fuelType}}</strong>  <span class="alert-link float-right" (click)="resetCar()">Change Car</span>
    </div>
    
    <div class="row">
      <div class="col-md-6 col-xs-12" *ngIf="!isCarSelected">
          <img class="logo animate__animated animate__flipInX" src="./assets/car-care.PNG" alt="CCubeLogo" border="0" />
      </div>
      <div class="col-md-6 col-xs-12" [class.col-md-12]="isCarSelected">

        <ng-container *ngIf="!isCarSelected">
            <heading text="Welcome to CCube."></heading>

            <heading text="Let's get to know your Car!"></heading>
    
            <car-form (carReady)="showPlans($event)"></car-form>
        </ng-container>

        <ng-container *ngIf="isCarSelected">

            <plan-slider *ngIf="isMobile" [plans]="currentPlans"></plan-slider>

            <!-- Button trigger modal -->
<button type="button" class="btn btn-primary" data-toggle="modal" data-target="#exampleModalLong">
    Launch demo modal
  </button>
  
  <!-- Modal -->
  <div class="modal fade" id="exampleModalLong" tabindex="-1" role="dialog" aria-labelledby="exampleModalLongTitle" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLongTitle">Modal title</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <plan-table></plan-table>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary">Save changes</button>
        </div>
      </div>
    </div>
  </div>

            <div *ngIf="!isMobile" class="card-deck row">
              <plan-card class="col-4" *ngFor="let plan of currentPlans" [plan]="plan"></plan-card>
            </div>

           
            
          </ng-container>
       
      </div>
    </div>
  </div>
