<div class="container">
  <div *ngIf="isCarSelected && currentCar" class="alert alert-primary" role="alert">
    <strong>{{currentCar.maker}}</strong> | <strong>{{currentCar.model}}</strong> |
    <strong>{{currentCar.bodyType}}</strong> <span class="alert-link float-right" (click)="resetCar()">Change Car</span>
  </div>

  <div class="row">
    <div class="col-md-6 col-xs-12" *ngIf="!isCarSelected">
      <img class="logo animate__animated animate__flipInX" src="./assets/car-care.PNG" alt="CCubeLogo" border="0" />
    </div>
    <div class="col-md-6 col-xs-12" [class.col-md-12]="isCarSelected">

      <ng-container *ngIf="!isCarSelected">
        <heading text="Welcome to CCube."></heading>

        <heading text="Let's get to know your Car!"></heading>

        <car-form (carReady)="showPlans($event)"></car-form>
      </ng-container>

      <ng-container *ngIf="isCarSelected">

        <ng-container *ngIf="!isPlanSelected">
            <plan-slider 
            
            [plans]="currentPlans" 
            [bodyType]="currentCar.bodyType"
            (showDetails)="onShowDetails($event)"
            (buyNow)="buyPlan($event)"
            
            ></plan-slider>

            <h2>Add Ons Section here</h2>

        </ng-container>
        

            <plan-details *ngIf="isPlanSelected" 
                [plan]="selectedPlan" 
                [features]="currentPlans.features"
                (changePlan)="isPlanSelected = false"
                (checkout)="goToCheckout()"
                ></plan-details>

        

        <!-- <div *ngIf="!isMobile" class="card-deck row">
          <plan-card class="col-4" *ngFor="let plan of currentPlans" [plan]="plan"></plan-card>
        </div> -->



      </ng-container>

    </div>
  </div>
</div>

<router-outlet></router-outlet>
