<ion-content>
  <div class="container-fluid">
    <div class="row checkout-content">
      <div class="offset-md-2 col-md-8">
        <div class="container">


          <div *ngIf="context=='checkout'" class="--padding-x">

            <selected-car *ngIf="selectedCar" [car]="selectedCar" (changeCar)="resetCar()"></selected-car>
            <ng-container *ngIf="(mode.plan || mode.addon || mode.adhoc) && selectedCar; else noItemsTemplate">
                <checkout-details 
                #detailsComp
                [includedAddons]="includedAddons" 
                [includedAdhocs]="includedAdhocs"
                [addon]="selectedAddon" 
                [adhoc]="selectedAdhoc"
                [plan]="selectedPlan" 
                [car]="selectedCar"
                [discount]="discount"
                [mode]="mode"
                (removeAddon)="onAddonSelected($event, true)"
                (removeAdhoc)="onAdhocSelected($event)"
                (removeCoupon)="onRemoveCoupon($event)"
                (showAddonDetails)="openAddon($event)"
                
                >
  
  
              </checkout-details>
  
              <coupons-list [slim]="true" 
                [appliedCoupons]="appliedCoupons" [availableCoupons]="availableCoupons" [totalAmount]="netPayable" 
                (discount)="applyDiscount($event)"
                (showAddons)="goToAddons()"
                ></coupons-list>
             
  
              <addon-slider  [bodyType]="selectedCar.bodyType" *ngIf="retryAddon && (mode.plan || mode.addon)" [blockedAddons]="blockedAddons" [selectedAddons]="includedAddons" (addonSelected)="onAddonSelected($event)" (showDetails)="openAddon($event)"></addon-slider>
              <adhoc-slider [bodyType]="selectedCar.bodyType" *ngIf="retryAddon && (mode.plan || mode.adhoc)" [selectedAdhocs]="includedAdhocs" (adhocSelected)="onAdhocSelected($event)"></adhoc-slider>
              <cta text="Confirm" [sticky]="true" [loading]="loading" (action)="confirmCheckout()"></cta>
            </ng-container>
            <ng-template #noItemsTemplate>
                <heading text="Looks like your cart is empty."></heading>
                <cta text="Back To Dashboard" (action)="backToDashboard()"></cta>
              </ng-template>


           
          </div>

          <div *ngIf="context=='confirm' && selectedCar" class="--padding-x">
            <selected-car *ngIf="selectedCar" [car]="selectedCar" (changeCar)="changeCar()"></selected-car>

            <cc-accordion #drawerCar title="Verify Your Car" [step]="'1'" [error]="carMismatch" [locked]="step2Ready">
              <car-form [regNo]="selectedCar.regNo" *ngIf="resetCarForm" [verifyOnly]="true" (carReady)="verifyCar($event)"></car-form>
              <div *ngIf="carMismatch && carIdentified" class="alert alert-danger" role="alert">
                Selected Car doesn't match with Registration Number!
                <br/>
                
              </div>

              <div class="row" *ngIf="carMismatch">
                <div class="col-6 --no-padding-right">
                    <cta text="Review Plan" (action)="updatePlan()"></cta>
                </div>
                <div class="col-6">
                    <cta class="float-right" (action)="resetCarNumber()" text="Change  Car No" outline="true"></cta>
                </div>
                 
                  
              </div>
              
              <div *ngIf="!carMismatch && carIdentified" class="alert alert-success" role="alert">
                Car Details Verified Succesfully!
              </div>
            </cc-accordion>

            <cc-accordion #drawerLocation title="Confirm Your Location" [step]="'2'" [disabled]="!step2Ready" [locked]="step3Ready">
              <confirm-location [location]="savedLocation" (confirm)="saveLocation($event)"></confirm-location>
            </cc-accordion>

            
            <cc-accordion #drawerTime title="Confirm Your Timings" [step]="'3'" [disabled]="!step3Ready" [locked]="verificationComplete">
              <heading text="What time do you leave for office ?"></heading>
                <input class="officeTime" name="officeTime" [(ngModel)]="officeTime" [ngxTimepicker]="picker" minutesGap="15" placeholder="ex. 10:00 AM">
                <ngx-material-timepicker #picker  minutesGap="15"></ngx-material-timepicker>
              <cta text="Confirm" (action)="completeVerification()"></cta>
            </cc-accordion>
