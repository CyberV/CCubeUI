<ion-app>
  <ion-header class="ion-header" *ngIf="isMobile">
    <ion-toolbar>

      <ion-title class="app-header ion-title">
          <ion-icon class="menu-btn float-left" (click)="toggleMenu()"
          *ngIf="isLoggedIn && ['checkout','confirm', 'thanks'].indexOf(context) < 0" name="menu-outline"></ion-icon>

        <div class="row" *ngIf="headerType=='text'">
          <div class="col-2">
             
          </div>
          <div class="col-8">
              <span class="header-text">{{headerText}}</span>
        
          </div>
          <div class="col-2 notif">
              <div class="btn-group" (click)="presentPopover($event)">
                <span >
                  <ion-icon [ngClass]="{
                    'animate__animated': true,
                     'active': notifToggleOpen,
                    'animate__swing': ready }"  name="notifications-outline"
                   ></ion-icon>
                  <span *ngIf="hasNewNotifications" class="notif-badge" [class.show]="ready">&nbsp;</span>
                </span>
              </div>
            </div>
        </div>


        <div *ngIf="headerType=='view'">
          <div class="row view-checkout" *ngIf="viewData.viewName=='checkout'">
            <div class="col-4 text">
              Checkout
            </div>
            <div class="col-8 payable">
              Net Payable: <span Rs>{{viewData.viewOptions.amount}}</span>
            </div>
          </div>
          <div class="row" *ngIf="viewData.viewName=='home'">
              <div class="offset-1 col-5 --uppercase">
                  <span class="link" (click)="goTo('book')">Book Demo</span>
                </div>
            <div class="col-3">
              <span class="link" (click)="goTo('signup')">Signup</span>
            </div>
            <div class="col-3">
              <span class="link" (click)="goTo('login')">Login</span>
            </div>
          </div>
          <div class="row view-dashboard" *ngIf="viewData.viewName=='service'">
            <div class="offset-2 col-8 text">
              Dashboard
            </div>
            <div class="col-2 notif">


              <div class="btn-group" (click)="presentPopover($event)">
                <span >

                  <ion-icon [ngClass]="{
                    'animate__animated': true,
                     'active': notifToggleOpen,
                    'animate__swing': ready }"  name="notifications-outline"
                   ></ion-icon>
                  <span *ngIf="hasNewNotifications" class="notif-badge" [class.show]="ready">&nbsp;</span>
                </span>

              </div>

            </div>
          </div>
        </div>

        <span *ngIf="headerType==''"><img src="assets/blueLogo.png"></span>

      </ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-menu class="side-menu" side="start" menuId="first" contentId="my-content">
    <div class="menu-header">
      <div class="top">
        <div class="row ">
          <div class="col-3 user-profile-image">
            <img src="assets/icons/user.png">
          </div>
          <div class="col-9 ">
            <div class="row user-row">
              <div class="col-12 name">
                {{currentUser && currentUser.name}}
              </div>
              <div class="col-12 phone">
                {{currentUser && currentUser.phone}}
              </div>
            </div>
          </div>
        </div>
        <ion-icon class="close" name="close-outline" (click)="toggleMenu()"></ion-icon>
      </div>
    </div>
    <ion-content>
      <ion-list class="menu-items">

        <ion-item lines="none" [class.selected]="context==='service'" (click)="goTo('service')">
          <ion-icon name="home-outline"></ion-icon> Dashboard
        </ion-item>
        <ion-item lines="none" [class.selected]="['select-car', 'plan', 'dashboard', 'checkout', 'confirm'].indexOf(context)>-1"
          (click)="goTo('dashboard')">
          <ion-icon name="car-sport-outline"></ion-icon> Add New Car
        </ion-item>
        <ion-item lines="none" [class.selected]="context==='profile'" (click)="goTo('profile')">
          <ion-icon name="person-circle-outline"></ion-icon>Profile
        </ion-item>
        <ion-item lines="none" [class.selected]="context==='refer'" (click)="goTo('refer')">
            <ion-icon name="wallet-outline"></ion-icon>Refer & Earn
          </ion-item>
        <ion-item lines="none" (click)="goTo('about-us')">
          <ion-icon name="people-circle-outline"></ion-icon>About Us
        </ion-item>
        <ion-item lines="none" (click)="goTo('contact-us')">
          <ion-icon name="mail-outline"></ion-icon>Contact Us
        </ion-item>
        <ion-item lines="none" (click)="logout()" > 
          <ion-icon name="power-outline"></ion-icon> Log Out
        </ion-item>

      </ion-list>
    </ion-content>
  </ion-menu>
