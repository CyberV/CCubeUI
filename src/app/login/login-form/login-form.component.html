<div *ngIf="page=='signup'" class="animate__animated animate__fadeInLeft">
  <heading text="Your Personal Details"></heading>

  <mobile-input type="text" name="Full Name" [(value)]="newUser.name" ></mobile-input>
  <mobile-input type="email" name="Email Id" [(value)]="newUser.email" ></mobile-input>
  <mobile-input type="password" name="Password" [(value)]="newUser.password" ></mobile-input>
  <mobile-input type="password" name="Confirm Password" [(value)]="newUser.confirmPassword" ></mobile-input>


  <verify-otp
     [mobile]="newUser.mobile" length="4" 
     (otpSubmitted)="customerOtp=$event" 
     [mismatch]="otpMismatch"
     (changeNumber)="page='home'"></verify-otp> 


  <cta text="Create Account" [loading]="loading" (action)="verifyOtp(customerOtp)" ></cta>
</div>

<div></div>

<div *ngIf="page=='car'" class="animate__animated animate__fadeInLeft">
  <heading text="Your Car Details"></heading>

  <ng-container *ngIf="!showCarSelector">
    <mobile-input type="text" uppercase="true" name="Registration Number" placeholder="HR51XX1122" [(value)]="newUser.car.regNo" ></mobile-input>
    <div class="animate__animated" [class.animate__fadeOutUp]="isTypingRegNo">
        <heading  text="OR" align="center"></heading>
  
        <cta *ngIf="!isTypingRegNo" text="Select your car" (action)="showCarSelector = true;"></cta>
    
    </div>

    <cta *ngIf="isRegNoValid && !findingCar" text="Get Car Details" (action)="findingCar = true" [loading]="loading"></cta>
    <car-display *ngIf="findingCar" [carNo]="newUser.car.regNo" (letsgo)="goToPlans($event)"></car-display>
  
  </ng-container>
  
  <select-car *ngIf="showCarSelector" (letsgo)="goToPlans($event)"></select-car>

  <!-- <typeahead type="text" name="Car Maker" [(value)]="newUser.car.maker"></typeahead>

</div>
