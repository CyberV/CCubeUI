<div *ngIf="context=='signup' || loginOnly" class="form-container " [class.expand]="otpSent">

  <div class="row">
    <div class="offset-1 col-10">
        <mobile-input name="Mobile Number" placeholder="" (enterKey)="focusTo('ctaOtp')" [(value)]="newUser.mobile" (valueChange)="otpSent = false;"></mobile-input>
        <cta #ctaOtp *ngIf="!otpSent" sticky="true" text="Get Verification Code" [loading]="loading" [disabled]="!isPhoneValid" (action)="beginAuth()">
        </cta>
      
        <br/>
      
        
        
      
        <verify-otp #verifyOtpComp
        *ngIf="otpSent"
       [mobile]="newUser.mobile" length="4" 
       (otpSubmitted)="handleOtp($event)" 
       [mismatch]="otpMismatch"
      ></verify-otp> 
      
       <cta *ngIf="otpSent" [loading]="loading" sticky="true" (action)="verifyOtp(customerOtp)" [disabled]="!customerOtp || customerOtp.toString().length < 4" [text]="existingUser || loginOnly ? userNotFound ? 'Signup' : 'Login' : 'Verify'"></cta>
        
    </div>
  </div>

  <ng-container *ngIf="!loginOnly">
      <span *ngIf="existingUser" class="login-banner">Welcome Back! Login Now with OTP.</span>
    
      <!-- <span *ngIf="!existingUser" class="login-banner">Already a Member? <a class="link" [routerLink]="['/signup/login']">Log In</a></span>     -->
  </ng-container>

  <span *ngIf="userNotFound" class="login-banner">We didn't find an Account with this number. Continue to Signup.</span>

      
</div>

<div *ngIf="context=='details'" class="animate__animated animate__fadeInLeft details-container">
  <mobile-input  [error]="errors ? errors.name : null" (enterKey)="focusTo('inpRef')" type="text" name="Full Name" [(value)]="newUser.name" (valueChange)="errors.name = null" ></mobile-input>
  <mobile-input  #inpRef (enterKey)="focusTo('inpEmail')" type="text" name="Referral Code" [(value)]="newUser.referedBy" ></mobile-input>
  <mobile-input #inpEmail  (enterKey)="focusTo('inpCity')" [error]="errors ? errors.email : null" type="email" name="Email Id" [(value)]="newUser.email" (valueChange)="validateEmail($event)"></mobile-input>
  <select-city  #inpCity  (enterKey)="focusTo('inpPass')"  [error]="errors ? errors.city : null" [(city)]="newUser.city"  (cityChange)="errors.city = null"></select-city>
  <mobile-input #inpPass (enterKey)="focusTo('inpConfirmPass')" [error]="errors ? errors.password : null" type="password" name="Password" [(value)]="newUser.password"  (valueChange)="errors.password = null" ></mobile-input>
  <mobile-input #inpConfirmPass (enterKey)="focusTo('ctaSignup')" [error]="errors ? errors.password : null" type="password" name="Confirm Password" [(value)]="newUser.confirmPassword"  (valueChange)="errors.password = null" ></mobile-input>
  




  <cta #ctaSignup *ngIf="!userExists" class="signup-btn" text="Create Account" [loading]="loading" (action)="createUser()" ></cta>

  <span  *ngIf="userExists" class="existingUser">Looks like you are already registered with us. <a class="link" [routerLink]="['/signup/login']">Log In</a></span>


</div>
