<div *ngIf="context=='signup'" class="form-container " [class.expand]="otpSent">

  <div class="row">
    <div class="offset-1 col-10">
        <mobile-input name="Mobile Number" placeholder="Enter your Mobile Number" (enterKey)="focusTo('ctaOtp')" [(value)]="newUser.mobile" (valueChange)="otpSent = false;"></mobile-input>
        <cta #ctaOtp *ngIf="!otpSent" sticky="true" text="Get Verification Code" [loading]="loading" [disabled]="!isPhoneValid" (action)="beginAuth()">
        </cta>
      
        <br/>
      
        
        
      
        <verify-otp
        *ngIf="otpSent"
       [mobile]="newUser.mobile" length="4" 
       (otpSubmitted)="handleOtp($event)" 
       [mismatch]="otpMismatch"
      ></verify-otp> 
      
       <cta *ngIf="otpSent" [loading]="loading" sticky="true" (action)="verifyOtp(customerOtp)" [disabled]="!customerOtp || customerOtp.toString().length < 4" text="Verify"></cta>
        
    </div>
  </div>

  <span  class="login-banner">Already a Member? <a class="link" [routerLink]="['/signup/login']">Log In</a></span>
      
      
</div>

<div *ngIf="context=='details'" class="animate__animated animate__fadeInLeft details-container">
  <mobile-input  [error]="errors ? errors.name : null" (enterKey)="focusTo('inpEmail')" type="text" name="Full Name" [(value)]="newUser.name" ></mobile-input>
  <mobile-input #inpEmail  (enterKey)="focusTo('inpCity')" [error]="errors ? errors.email : null" type="email" name="Email Id" [(value)]="newUser.email" ></mobile-input>
  <select-city  #inpCity  (enterKey)="focusTo('inpPass')"[(city)]="newUser.city"></select-city>
  <mobile-input #inpPass (enterKey)="focusTo('inpConfirmPass')" [error]="errors ? errors.password : null" type="password" name="Password" [(value)]="newUser.password" ></mobile-input>
  <mobile-input #inpConfirmPass (enterKey)="focusTo('ctaSignup')" [error]="errors ? errors.password : null" type="password" name="Confirm Password" [(value)]="newUser.confirmPassword" ></mobile-input>
  




  <cta #ctaSignup *ngIf="!userExists" class="signup-btn" sticky="true" text="Create Account" [loading]="loading" (action)="createUser()" ></cta>

  <span  *ngIf="userExists" class="existingUser">Looks like you are already registered with us. <a class="link" [routerLink]="['/signup/login']">Log In</a></span>


</div>

<div></div>
